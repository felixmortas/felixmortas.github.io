<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eco-Footprint Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#F9FAFB] text-[#111827]">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="border-b border-gray-200 bg-white sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="bg-green-600 p-1.5 rounded-lg">
                        <i data-lucide="leaf" class="w-5 h-5 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">AI Eco-Footprint</h1>
                </div>
                <div class="hidden sm:flex items-center gap-4 text-sm font-medium text-gray-500">
                    <button onclick="openModal('methodology')" class="hover:text-green-600 transition-colors">Methodology</button>
                    <button onclick="openModal('api')" class="hover:text-green-600 transition-colors">API</button>
                    <button onclick="exportReport()" class="bg-gray-900 text-white px-4 py-2 rounded-full text-xs hover:bg-gray-800 transition-all flex items-center gap-2">
                        <i data-lucide="download" class="w-3 h-3"></i>
                        Export Report
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- Left Column: Inputs -->
                <div class="lg:col-span-4 space-y-6">
                    <section class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                        <div class="flex items-center gap-2 mb-6">
                            <i data-lucide="settings-2" class="w-4 h-4 text-gray-400"></i>
                            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500">Configuration</h2>
                        </div>

                        <div class="space-y-5">
                            <!-- Model Selection -->
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Model Preset</label>
                                <select id="modelPreset" onchange="handlePresetChange(this.value)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                    <!-- Options populated by JS -->
                                </select>
                            </div>

                            <!-- Parameters -->
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Parameters (Billions)</label>
                                <div class="flex gap-3 mb-3">
                                    <input type="number" id="paramsB" oninput="updateParams(this.value)" class="w-24 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm font-mono font-bold text-green-600 focus:ring-2 focus:ring-green-500 outline-none">
                                    <input type="range" id="paramsBSlider" min="1" max="2000" step="1" oninput="updateParams(this.value)" class="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600 my-auto">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Input Tokens</label>
                                    <input type="number" id="inputTokens" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Output Tokens</label>
                                    <input type="number" id="outputTokens" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Reasoning Tokens</label>
                                <input type="number" id="reasoningTokens" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                            </div>

                            <hr class="border-gray-100" />

                            <!-- Infrastructure -->
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Cloud Provider</label>
                                    <select id="provider" onchange="handleProviderChange(this.value)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                        <option value="">Manual Entry</option>
                                        <!-- Options populated by JS -->
                                    </select>
                                </div>

                                <div id="regionContainer" class="hidden">
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Provider Region</label>
                                    <select id="providerRegion" onchange="handleRegionChange(this.value)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                        <option value="">Select Region...</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Country Preset</label>
                                        <select id="country" onchange="handleCountryChange(this.value)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                            <!-- Options populated by JS -->
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Intensity (g/kWh)</label>
                                        <input type="number" id="carbonIntensity" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">PUE</label>
                                        <input type="number" id="pue" step="0.01" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">WUE (L/kWh)</label>
                                        <input type="number" id="wue" step="0.01" oninput="calculate()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Right Column: Results -->
                <div class="lg:col-span-8 space-y-6">
                    <!-- Summary Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="p-2 bg-yellow-50 rounded-lg">
                                    <i data-lucide="zap" class="w-5 h-5 text-yellow-600"></i>
                                </div>
                                <span class="text-xs font-bold text-gray-500 uppercase">Energy Use</span>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span id="resEnergy" class="text-3xl font-bold tracking-tight">0.00</span>
                                <span class="text-sm font-medium text-gray-400">Wh</span>
                            </div>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="p-2 bg-red-50 rounded-lg">
                                    <i data-lucide="cloud" class="w-5 h-5 text-red-600"></i>
                                </div>
                                <span class="text-xs font-bold text-gray-500 uppercase">Carbon Footprint</span>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span id="resCarbon" class="text-3xl font-bold tracking-tight">0.00</span>
                                <span class="text-sm font-medium text-gray-400">g CO2e</span>
                            </div>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="p-2 bg-blue-50 rounded-lg">
                                    <i data-lucide="droplets" class="w-5 h-5 text-blue-600"></i>
                                </div>
                                <span class="text-xs font-bold text-gray-500 uppercase">Water Usage</span>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span id="resWater" class="text-3xl font-bold tracking-tight">0.00</span>
                                <span class="text-sm font-medium text-gray-400">Liters</span>
                            </div>
                        </div>
                    </div>

                    <!-- Visualizations -->
                    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center justify-between mb-8">
                            <div class="flex items-center gap-2">
                                <i data-lucide="bar-chart-3" class="w-5 h-5 text-gray-400"></i>
                                <h2 class="text-lg font-bold">Impact Breakdown</h2>
                            </div>
                        </div>
                        <div id="chartContainer" class="h-[300px] w-full flex items-end justify-around gap-4 pb-8 border-b border-gray-100">
                            <!-- Bars rendered by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 border-t border-gray-200 mt-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-2 opacity-50">
                    <i data-lucide="leaf" class="w-4 h-4"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">AI Eco-Footprint v1.2 (Static)</span>
                </div>
                <div class="flex gap-8 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                    <button onclick="openModal('sources')" class="hover:text-gray-900 transition-colors">Data Sources</button>
                    <button onclick="openModal('privacy')" class="hover:text-gray-900 transition-colors">Privacy</button>
                    <a href="https://github.com" target="_blank" class="hover:text-gray-900 transition-colors flex items-center gap-1">
                        <i data-lucide="github" class="w-3 h-3"></i>
                        GitHub
                    </a>
                </div>
            </div>
        </footer>

        <!-- Modals -->
        <div id="modalOverlay" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[80vh] overflow-hidden shadow-2xl flex flex-col">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h3 id="modalTitle" class="text-xl font-bold tracking-tight">Modal Title</h3>
                    <button onclick="closeModal()" class="p-2 hover:bg-gray-200 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="modalContent" class="p-8 overflow-y-auto text-gray-600 leading-relaxed space-y-4">
                    <!-- Content injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data
        const REGIONS = [
            { name: "France", carbonIntensity: 58 },
            { name: "Germany", carbonIntensity: 385 },
            { name: "USA", carbonIntensity: 367 },
            { name: "United Kingdom", carbonIntensity: 250 },
            { name: "Canada", carbonIntensity: 150 },
            { name: "India", carbonIntensity: 720 },
            { name: "Sweden", carbonIntensity: 12 },
            { name: "Poland", carbonIntensity: 700 },
        ];

        const PROVIDERS = [
            {
                name: "AWS",
                regions: [
                    { id: "us-east-1", name: "N. Virginia", country: "USA", pue: 1.15, wue: 0.4 },
                    { id: "eu-west-3", name: "Paris", country: "France", pue: 1.12, wue: 0.3 },
                    { id: "eu-central-1", name: "Frankfurt", country: "Germany", pue: 1.2, wue: 0.5 },
                ]
            },
            {
                name: "Google Cloud",
                regions: [
                    { id: "us-central1", name: "Iowa", country: "USA", pue: 1.1, wue: 0.2 },
                    { id: "europe-west1", name: "Belgium", country: "Germany", pue: 1.11, wue: 0.25 },
                    { id: "asia-south1", name: "Mumbai", country: "India", pue: 1.3, wue: 0.6 },
                ]
            },
            {
                name: "Azure",
                regions: [
                    { id: "eastus", name: "East US", country: "USA", pue: 1.18, wue: 0.45 },
                    { id: "swedencentral", name: "Sweden Central", country: "Sweden", pue: 1.05, wue: 0.1 },
                ]
            }
        ];

        const MODEL_PRESETS = [
            { name: "GPT-4o (Estimated)", parametersB: 1800 },
            { name: "GPT-3.5 (Estimated)", parametersB: 175 },
            { name: "Llama 3 70B", parametersB: 70 },
            { name: "Llama 3 8B", parametersB: 8 },
            { name: "Mistral 7B", parametersB: 7 },
            { name: "Mixtral 8x7B (Activated)", parametersB: 12 },
        ];

        const CONSTANTS = {
            ENERGY_PER_B_PARAMS_PER_TOKEN: 0.00005,
            DEFAULT_PUE: 1.5,
            DEFAULT_WUE: 0.5
        };

        // State
        let state = {
            paramsB: 1800,
            inputTokens: 1000,
            outputTokens: 500,
            reasoningTokens: 0,
            provider: "",
            regionId: "",
            country: "France",
            carbonIntensity: 58,
            pue: 1.5,
            wue: 0.5
        };

        // Initialize
        function init() {
            // Populate Model Presets
            const modelSelect = document.getElementById('modelPreset');
            MODEL_PRESETS.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = p.name;
                modelSelect.appendChild(opt);
            });

            // Populate Providers
            const providerSelect = document.getElementById('provider');
            PROVIDERS.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = p.name;
                providerSelect.appendChild(opt);
            });

            // Populate Countries
            const countrySelect = document.getElementById('country');
            REGIONS.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.name;
                opt.textContent = r.name;
                countrySelect.appendChild(opt);
            });

            // Set initial values
            document.getElementById('paramsB').value = state.paramsB;
            document.getElementById('paramsBSlider').value = state.paramsB;
            document.getElementById('inputTokens').value = state.inputTokens;
            document.getElementById('outputTokens').value = state.outputTokens;
            document.getElementById('reasoningTokens').value = state.reasoningTokens;
            document.getElementById('country').value = state.country;
            document.getElementById('carbonIntensity').value = state.carbonIntensity;
            document.getElementById('pue').value = state.pue;
            document.getElementById('wue').value = state.wue;

            calculate();
            lucide.createIcons();
        }

        // Handlers
        function updateParams(val) {
            state.paramsB = Number(val);
            document.getElementById('paramsB').value = val;
            document.getElementById('paramsBSlider').value = val;
            calculate();
        }

        function handlePresetChange(name) {
            const preset = MODEL_PRESETS.find(p => p.name === name);
            if (preset) {
                updateParams(preset.parametersB);
            }
        }

        function handleProviderChange(name) {
            state.provider = name;
            const regionContainer = document.getElementById('regionContainer');
            const regionSelect = document.getElementById('providerRegion');
            
            if (name) {
                regionContainer.classList.remove('hidden');
                regionSelect.innerHTML = '<option value="">Select Region...</option>';
                const p = PROVIDERS.find(p => p.name === name);
                p.regions.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    opt.textContent = `${r.name} (${r.id})`;
                    regionSelect.appendChild(opt);
                });
            } else {
                regionContainer.classList.add('hidden');
            }
            calculate();
        }

        function handleRegionChange(id) {
            state.regionId = id;
            if (!id) return;

            const p = PROVIDERS.find(p => p.name === state.provider);
            const r = p.regions.find(r => r.id === id);
            
            if (r) {
                state.country = r.country;
                state.pue = r.pue;
                state.wue = r.wue;
                
                const cData = REGIONS.find(c => c.name === r.country);
                if (cData) state.carbonIntensity = cData.carbonIntensity;

                document.getElementById('country').value = state.country;
                document.getElementById('carbonIntensity').value = state.carbonIntensity;
                document.getElementById('pue').value = state.pue;
                document.getElementById('wue').value = state.wue;
            }
            calculate();
        }

        function handleCountryChange(name) {
            state.country = name;
            const cData = REGIONS.find(c => c.name === name);
            if (cData) {
                state.carbonIntensity = cData.carbonIntensity;
                document.getElementById('carbonIntensity').value = state.carbonIntensity;
            }
            calculate();
        }

        function calculate() {
            // Sync state from inputs
            state.inputTokens = Number(document.getElementById('inputTokens').value);
            state.outputTokens = Number(document.getElementById('outputTokens').value);
            state.reasoningTokens = Number(document.getElementById('reasoningTokens').value);
            state.carbonIntensity = Number(document.getElementById('carbonIntensity').value);
            state.pue = Number(document.getElementById('pue').value);
            state.wue = Number(document.getElementById('wue').value);

            const totalTokens = state.inputTokens + state.outputTokens + state.reasoningTokens;
            const energyJ = (state.paramsB * totalTokens * CONSTANTS.ENERGY_PER_B_PARAMS_PER_TOKEN) * state.pue;
            const energyKWh = energyJ / 3600000;
            const co2g = energyKWh * state.carbonIntensity;
            const waterL = energyKWh * state.wue;

            // Update UI
            document.getElementById('resEnergy').textContent = (energyKWh * 1000).toFixed(2);
            document.getElementById('resCarbon').textContent = co2g.toFixed(2);
            document.getElementById('resWater').textContent = waterL.toFixed(2);

            renderChart(energyKWh * 1000, co2g, waterL * 100);
        }

        function renderChart(energy, carbon, water) {
            const container = document.getElementById('chartContainer');
            container.innerHTML = '';
            
            // We use normalized values for the chart so they are visually comparable
            // while keeping the tooltips/labels accurate in the summary cards
            const data = [
                { label: 'Energy', value: energy, color: '#EAB308' },
                { label: 'CO2e', value: carbon * 10, color: '#EF4444' }, // Scaled for visibility
                { label: 'Water', value: water * 2, color: '#3B82F6' }   // Scaled for visibility
            ];

            const max = Math.max(...data.map(d => d.value), 1);

            data.forEach(d => {
                const height = (d.value / max) * 100;
                const barWrapper = document.createElement('div');
                barWrapper.className = 'flex flex-col items-center justify-end gap-2 w-full max-w-[80px] h-full';
                
                const bar = document.createElement('div');
                bar.className = 'w-full rounded-t-lg transition-all duration-700 ease-out';
                // Ensure a minimum visible height of 4px
                bar.style.height = `calc(${Math.max(height, 2)}% - 20px)`; 
                bar.style.backgroundColor = d.color;
                
                const label = document.createElement('span');
                label.className = 'text-[10px] font-bold text-gray-400 uppercase text-center truncate w-full';
                label.textContent = d.label;

                barWrapper.appendChild(bar);
                barWrapper.appendChild(label);
                container.appendChild(barWrapper);
            });
        }

        // Modals
        const modalData = {
            methodology: {
                title: "Methodology",
                content: `
                    <div class="flex items-center gap-3 mb-4 text-green-600">
                        <i data-lucide="file-text" class="w-6 h-6"></i>
                        <h4 class="font-bold">How we calculate the footprint</h4>
                    </div>
                    <p>Our calculation model is based on the energy consumption per parameter per token. We use a heuristic derived from research papers like <em>Luccioni et al. (2023)</em>.</p>
                    <ul class="list-disc pl-5 space-y-2 mt-4">
                        <li><strong>Energy (J)</strong> = (Parameters × Total Tokens × Energy Coefficient) × PUE</li>
                        <li><strong>PUE (Power Usage Effectiveness)</strong>: The ratio of total power used by a data center facility to the power delivered to computing equipment.</li>
                        <li><strong>Carbon Intensity</strong>: Regional grid emissions data (gCO2e/kWh) applied to the total energy consumption.</li>
                        <li><strong>Water Usage</strong>: Calculated using WUE (Water Usage Effectiveness) which represents liters of water used per kWh of energy consumed for cooling.</li>
                    </ul>
                `
            },
            api: {
                title: "API Documentation",
                content: `
                    <div class="flex items-center gap-3 mb-4 text-blue-600">
                        <i data-lucide="code-2" class="w-6 h-6"></i>
                        <h4 class="font-bold">Integration Guide</h4>
                    </div>
                    <p>Integrate our calculator into your CI/CD pipelines or monitoring tools using our REST API (Coming Soon).</p>
                    <pre class="bg-gray-900 text-green-400 p-4 rounded-xl mt-4 text-xs font-mono overflow-x-auto">
POST /api/v1/calculate
{
  "model": "llama-3-70b",
  "tokens": { "input": 1000, "output": 500 },
  "provider": "aws",
  "region": "us-east-1"
}
                    </pre>
                `
            },
            sources: {
                title: "Data Sources",
                content: `
                    <div class="flex items-center gap-3 mb-4 text-purple-600">
                        <i data-lucide="database" class="w-6 h-6"></i>
                        <h4 class="font-bold">Research & Data</h4>
                    </div>
                    <p>We rely on open-source data and peer-reviewed research to maintain accuracy:</p>
                    <ul class="list-disc pl-5 space-y-2 mt-4">
                        <li><strong>Emissions Factors</strong>: Electricity Maps API & IEA Data.</li>
                        <li><strong>Model Sizes</strong>: Hugging Face Model Hub & Official Technical Reports.</li>
                        <li><strong>DC Efficiency</strong>: Annual sustainability reports from AWS, Google, and Microsoft.</li>
                    </ul>
                `
            },
            privacy: {
                title: "Privacy Policy",
                content: `
                    <div class="flex items-center gap-3 mb-4 text-orange-600">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                        <h4 class="font-bold">Your Data</h4>
                    </div>
                    <p>We value your privacy. This calculator runs entirely in your browser. No input data is sent to our servers or stored permanently.</p>
                    <p class="mt-4">The "Export Report" feature generates a local file on your machine and does not upload your results anywhere.</p>
                `
            }
        };

        function openModal(id) {
            const data = modalData[id];
            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalContent').innerHTML = data.content;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('modalOverlay').classList.add('flex');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.getElementById('modalOverlay').classList.remove('flex');
        }

        function exportReport() {
            const report = {
                model: state.paramsB + "B Parameters",
                tokens: state.inputTokens + state.outputTokens + state.reasoningTokens,
                infrastructure: { 
                    provider: state.provider || "Manual", 
                    country: state.country, 
                    pue: state.pue, 
                    wue: state.wue 
                },
                timestamp: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ai-footprint-report-${Date.now()}.json`;
            a.click();
        }

        // Run
        init();
    </script>
</body>
